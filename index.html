<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Calendar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background-color: #a29bfe;
    margin:0;
    padding:15px;
}

h1{
    text-align:center;
    margin-bottom:15px;
}

/* CONTROLS */
.controls{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    margin-bottom:15px;
}

.controls button{
    padding:8px 14px;
    border:none;
    border-radius:6px;
    background:#4CAF50;
    color:white;
    cursor:pointer;
}

#currentMonth{
    font-size:20px;
    font-weight:bold;
}

/* MAIN LAYOUT */
.main{
    display:flex;
    gap:15px;
    max-width:1200px;
    margin:auto;
}

/* CALENDAR */
.calendar{
    flex:3;
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:6px;
}

.day-header{
    background:#4CAF50;
    color:white;
    text-align:center;
    padding:8px;
    border-radius:4px;
    font-size:14px;
}

.day{
    background:white;
    border-radius:6px;
    padding:6px;
    min-height:90px;
    box-shadow:0 1px 4px rgba(0,0,0,0.1);
}

.day strong{
    display:block;
    margin-bottom:4px;
}

.event{
    font-size:12px;
    padding:3px 6px;
    margin-top:3px;
    border-radius:4px;
}

.sports{background:#ffeaa7;}
.academic{background:#a29bfe;color:white;}
.cultural{background:#fd79a8;color:white;}

/* ADD EVENT PANEL */
.add-event{
    flex:1;
    background:white;
    padding:15px;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    height:fit-content;
}

.add-event h3{
    margin-top:0;
}

.add-event input,
.add-event select{
    width:100%;
    padding:8px;
    margin-bottom:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

.add-event button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:6px;
    background:#4CAF50;
    color:white;
    cursor:pointer;
}

/* RESPONSIVE */
@media(max-width:900px){
    .main{
        flex-direction:column;
    }
}
</style>
</head>

<body>

<h1>Smart Calendar</h1>

<div class="controls">
    <button onclick="previousMonth()">← Previous</button>
    <span id="currentMonth"></span>
    <button onclick="nextMonth()">Next →</button>
</div>

<div class="main">

    <!-- CALENDAR -->
    <div class="calendar" id="calendar"></div>

    <!-- ADD EVENT -->
    <div class="add-event">
        <h3>Add New Event</h3>
        <input type="date" id="eventDate">
        <input type="text" id="eventTitle" placeholder="Event Title">
        <select id="eventType">
            <option value="sports">Sports</option>
            <option value="academic">Academic</option>
            <option value="cultural">Cultural</option>
        </select>
        <button onclick="addEvent()">Add Event</button>
    </div>

</div>

<script>
const monthNames=["January","February","March","April","May","June",
"July","August","September","October","November","December"];
const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

let currentDate=new Date();

/* ✅ LOAD EVENTS FROM LOCALSTORAGE */
let events = JSON.parse(localStorage.getItem("schoolEvents")) || [
 {date:new Date(currentDate.getFullYear(),currentDate.getMonth(),15),
  title:"Sports Day",type:"sports"},
 {date:new Date(currentDate.getFullYear(),currentDate.getMonth(),20),
  title:"Science Fair",type:"academic"}
];

/* Convert date string → Date object */
events = events.map(e => ({
  ...e,
  date: new Date(e.date)
}));

function generateCalendar(){
 const year=currentDate.getFullYear();
 const month=currentDate.getMonth();

 document.getElementById("currentMonth").innerText =
 monthNames[month]+" "+year;

 const firstDay=new Date(year,month,1);
 const lastDay=new Date(year,month+1,0);

 let html="";

 dayNames.forEach(d=>{
   html+=`<div class="day-header">${d}</div>`;
 });

 for(let i=0;i<firstDay.getDay();i++){
   html+=`<div class="day"></div>`;
 }

 for(let d=1;d<=lastDay.getDate();d++){
   const date=new Date(year,month,d);
   const dayEvents=events.filter(e =>
     e.date.toDateString()===date.toDateString()
   );

   let eHTML="";
   dayEvents.forEach(e=>{
     eHTML+=`<div class="event ${e.type}">${e.title}</div>`;
   });

   html+=`
   <div class="day">
     <strong>${d}</strong>
     ${eHTML}
   </div>`;
 }

 document.getElementById("calendar").innerHTML=html;
}

function previousMonth(){
 currentDate.setMonth(currentDate.getMonth()-1);
 generateCalendar();
}

function nextMonth(){
 currentDate.setMonth(currentDate.getMonth()+1);
 generateCalendar();
}

function addEvent(){
 const date=document.getElementById("eventDate").value;
 const title=document.getElementById("eventTitle").value;
 const type=document.getElementById("eventType").value;

 if(date && title){
   events.push({
     date:new Date(date),
     title,
     type
   });

   /* ✅ SAVE TO LOCALSTORAGE */
   localStorage.setItem("schoolEvents", JSON.stringify(events));

   generateCalendar();
   document.getElementById("eventTitle").value="";
 }
}

/* INIT */
generateCalendar();
document.getElementById("eventDate").valueAsDate=new Date();
</script>

</body>
</html>
