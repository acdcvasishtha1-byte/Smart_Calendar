<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Smart Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Priority colors based on High/Medium/Low */
        .priority-high { 
            border-left: 4px solid #ef4444; 
            background: linear-gradient(to right, #fff, #fee2e2);
        }
        .priority-medium { 
            border-left: 4px solid #f59e0b; 
            background: linear-gradient(to right, #fff, #fef3c7);
        }
        .priority-low { 
            border-left: 4px solid #10b981; 
            background: linear-gradient(to right, #fff, #d1fae5);
        }
        
        .calendar-day {
            transition: all 0.3s ease;
            min-height: 70px;
            font-size: 0.75rem;
        }
        
        @media (min-width: 640px) {
            .calendar-day {
                min-height: 100px;
                font-size: 0.875rem;
            }
        }
        
        .task-badge {
            animation: slideIn 0.3s ease;
            font-size: 0.65rem;
            padding: 2px 4px;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-5px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .current-day {
            border: 2px solid #3b82f6;
            background-color: #eff6ff;
        }
        
        button, .task-item, .calendar-day {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        @media (max-width: 640px) {
            #taskModal .bg-white {
                margin: 1rem;
                max-height: 90vh;
                overflow-y: auto;
            }
        }
        
        .touch-target {
            min-height: 44px;
            min-width: 44px;
        }
        
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <div class="container mx-auto px-2 sm:px-4 py-2 sm:py-8 max-w-7xl">
        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600 via-purple-600 to-purple-600 rounded-xl sm:rounded-2xl shadow-xl p-3 sm:p-6 mb-3 sm:mb-8 text-white">
            <div class="flex flex-col space-y-2 sm:space-y-0 sm:flex-row justify-between items-center">
                <div class="text-center sm:text-left">
                    <h1 class="text-xl sm:text-2xl md:text-4xl font-bold flex items-center justify-center sm:justify-start">
                        <i class="fas fa-calendar-alt mr-2"></i> 
                        <span class="hidden xs:inline"></span>Smart Calendar
                    </h1>
                    
                </div>
                
                <!-- Weather Info -->
                <div class="w-full sm:w-auto overflow-x-auto hide-scrollbar">
                    <div class="flex sm:grid sm:grid-cols-3 gap-3 sm:gap-6 p-1 min-w-max sm:min-w-0">
                        
                        <div class="text-center bg-white bg-opacity-20 rounded-lg px-3 py-1 sm:px-0 sm:bg-transparent">
                            <i class="fas fa-clock text-xl sm:text-3xl mb-0 sm:mb-1"></i>
                            <div class="text-xs sm:text-sm" id="currentTime"></div>
                            <div class="font-bold text-xs sm:text-sm" id="currentDate"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Priority Legend - CORRECTED with High/Medium/Low -->
        <div class="grid grid-cols-1 sm:grid-cols-4 gap-2 sm:gap-4 mb-3 sm:mb-6">
            <div class="sm:col-span-3 bg-white rounded-xl shadow-md p-2 sm:p-4">
                <h2 class="text-sm sm:text-lg font-semibold mb-2 flex items-center">
                    <i class="fas fa-tag text-blue-500 mr-2 text-sm sm:text-base"></i> 
                    <span class="text-xs sm:text-sm">Priority Levels</span>
                </h2>
                <div class="grid grid-cols-3 gap-1 sm:gap-3">
                    <div class="flex items-center p-1 sm:p-2 rounded-lg bg-red-50 text-[10px] sm:text-xs">
                        <span class="w-2 h-2 sm:w-3 sm:h-3 bg-red-500 rounded-full mr-1"></span> 
                        <span class="font-bold">HIGH</span> - Work/Meeting
                    </div>
                    <div class="flex items-center p-1 sm:p-2 rounded-lg bg-yellow-50 text-[10px] sm:text-xs">
                        <span class="w-2 h-2 sm:w-3 sm:h-3 bg-yellow-500 rounded-full mr-1"></span> 
                        <span class="font-bold">MEDIUM</span> - Personal/Health
                    </div>
                    <div class="flex items-center p-1 sm:p-2 rounded-lg bg-green-50 text-[10px] sm:text-xs">
                        <span class="w-2 h-2 sm:w-3 sm:h-3 bg-green-500 rounded-full mr-1"></span> 
                        <span class="font-bold">LOW</span> - Reminders
                    </div>
                </div>
            </div>
            
            <!-- Stats -->
            <div class="bg-white rounded-xl shadow-md p-2 sm:p-4">
                <h2 class="text-sm sm:text-lg font-semibold mb-1 sm:mb-2 flex items-center">
                    <i class="fas fa-chart-pie text-green-500 mr-1 text-sm"></i>
                    <span class="text-xs">Stats</span>
                </h2>
                <div class="grid grid-cols-3 gap-1 text-center">
                    <div class="bg-red-50 rounded p-1">
                        <div class="text-base sm:text-xl font-bold text-red-600" id="statHigh">0</div>
                        <div class="text-[8px] sm:text-xs text-gray-500">High</div>
                    </div>
                    <div class="bg-yellow-50 rounded p-1">
                        <div class="text-base sm:text-xl font-bold text-yellow-600" id="statMedium">0</div>
                        <div class="text-[8px] sm:text-xs text-gray-500">Med</div>
                    </div>
                    <div class="bg-green-50 rounded p-1">
                        <div class="text-base sm:text-xl font-bold text-green-600" id="statLow">0</div>
                        <div class="text-[8px] sm:text-xs text-gray-500">Low</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add Task Form - CORRECTED with High/Medium/Low -->
        <div class="bg-white rounded-xl shadow-md p-3 sm:p-5 mb-3 sm:mb-6">
            <h2 class="text-base sm:text-xl font-bold mb-2 sm:mb-4 flex items-center">
                <i class="fas fa-plus-circle text-blue-500 mr-2"></i> Add New Task
                <span class="ml-auto text-[10px] sm:text-sm text-gray-500" id="totalTasks">0</span>
            </h2>
            
            <form id="taskForm" class="space-y-2 sm:space-y-4">
                <div class="grid grid-cols-1 sm:grid-cols-5 gap-2">
                    <div class="sm:col-span-1">
                        <input type="text" id="taskTitle" placeholder="Task title" required
                            class="w-full px-2 sm:px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                    
                    <div class="grid grid-cols-2 sm:grid-cols-3 gap-2 sm:col-span-3">
                        <input type="date" id="taskDate" required
                            class="w-full px-2 sm:px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        
                        <input type="time" id="taskTime" required
                            class="w-full px-2 sm:px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        
                        <!-- CORRECTED: High/Medium/Low Priority Options -->
                        <select id="taskPriority" class="w-full px-2 sm:px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 col-span-2 sm:col-span-1">
                            <option value="high" class="text-red-600 font-bold">🔴 HIGH - Work/Meeting</option>
                            <option value="medium" class="text-yellow-600 font-bold" selected>🟡 MEDIUM - Personal/Health</option>
                            <option value="low" class="text-green-600 font-bold">🟢 LOW - Reminders</option>
                        </select>
                    </div>
                    
                    <div class="sm:col-span-1">
                        <button type="submit" 
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-2 sm:px-4 rounded-lg text-sm touch-target">
                            <i class="fas fa-plus mr-1"></i> Add
                        </button>
                    </div>
                </div>
                
                <div>
                    <input type="text" id="taskDesc" placeholder="Description (optional)"
                        class="w-full px-2 sm:px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>
            </form>
        </div>

        <!-- Calendar Navigation -->
        <div class="flex flex-col sm:flex-row justify-between items-center mb-2 sm:mb-4 space-y-2 sm:space-y-0">
            <h2 class="text-base sm:text-2xl font-bold flex items-center">
                <i class="fas fa-calendar-week text-purple-500 mr-2 text-sm sm:text-base"></i>
                <span id="monthYearDisplay" class="text-sm sm:text-base"></span>
            </h2>
            <div class="flex space-x-2 w-full sm:w-auto">
                <button onclick="changeMonth(-1)" class="flex-1 sm:flex-none bg-white hover:bg-gray-100 px-3 sm:px-4 py-2 rounded-lg shadow text-xs sm:text-sm touch-target">
                    <i class="fas fa-chevron-left"></i> <span class="hidden xs:inline">Prev</span>
                </button>
                <button onclick="changeMonth(1)" class="flex-1 sm:flex-none bg-white hover:bg-gray-100 px-3 sm:px-4 py-2 rounded-lg shadow text-xs sm:text-sm touch-target">
                    <span class="hidden xs:inline">Next</span> <i class="fas fa-chevron-right"></i>
                </button>
                <button onclick="goToToday()" class="flex-1 sm:flex-none bg-blue-500 hover:bg-blue-600 text-white px-3 sm:px-4 py-2 rounded-lg shadow text-xs sm:text-sm touch-target">
                    <i class="fas fa-calendar-day"></i> <span class="hidden xs:inline">Today</span>
                </button>
            </div>
        </div>

        <!-- Calendar Grid -->
        <div class="bg-blue-100 rounded-xl shadow-lg p-1 sm:p-4 mb-3 sm:mb-6 overflow-x-auto hide-scrollbar">
            <!-- Week Days Header -->
            <div class="grid grid-cols-7 gap-[1px] sm:gap-1 mb-1 sm:mb-2 min-w-[280px]">
                <div class="text-center font-semibold text-gray-600 py-1 text-[10px] sm:text-sm">S</div>
                <div class="text-center font-semibold text-gray-600 py-1 text-[10px] sm:text-sm">M</div>
                <div class="text-center font-semibold text-gray-600 py-1 text-[10px] sm:text-sm">T</div>
                <div class="text-center font-semibold text-gray-600 py-1 text-[10px] sm:text-sm">W</div>
                <div class="text-center font-semibold text-gray-600 py-1 text-[10px] sm:text-sm">T</div>
                <div class="text-center font-semibold text-gray-600 py-1 text-[10px] sm:text-sm">F</div>
                <div class="text-center font-semibold text-gray-600 py-1 text-[10px] sm:text-sm">S</div>
            </div>

            <!-- Calendar Days -->
            <div id="calendarGrid" class="grid grid-cols-7 gap-[1px] sm:gap-1 min-w-[280px] ">
                <!-- Dynamically filled -->
            </div>
        </div>

        <!-- Today's Tasks -->
        <div class="bg-gradient-to-r from-green-500 to-teal-500 rounded-xl shadow-md p-2 sm:p-5 text-white">
            <div class="flex justify-between items-center mb-2 sm:mb-3">
                <h3 class="font-bold text-sm sm:text-lg flex items-center">
                    <i class="fas fa-tasks mr-2 text-xs sm:text-base"></i> Today's Tasks
                </h3>
                <span class="bg-white text-green-600 px-2 py-1 rounded-full text-[10px] sm:text-sm font-bold" id="todayTaskCount">0</span>
            </div>
            <div id="todayTasksList" class="text-blue-900 space-y-2 max-h-40 sm:max-h-none overflow-y-auto hide-scrollbar">
                <!-- Today's tasks will be listed here -->
            </div>
        </div>
    </div>

    <!-- Task Details Modal -->
    <div id="taskModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl p-4 sm:p-6 max-w-md w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-3 sm:mb-4">
                <h3 class="text-base sm:text-xl font-bold" id="modalTitle">Task Details</h3>
                <button onclick="closeModal()" class="text-gray-500 hover:text-gray-700 p-2 touch-target">
                    <i class="fas fa-times text-xl sm:text-2xl"></i>
                </button>
            </div>
            <div id="modalContent" class="space-y-2 sm:space-y-3 text-sm sm:text-base">
                <!-- Modal content -->
            </div>
            <div class="flex flex-col sm:flex-row space-y-2 sm:space-y-0 sm:space-x-2 mt-3 sm:mt-4">
                <button onclick="completeTaskFromModal()" class="w-full sm:flex-1 bg-green-500 hover:bg-green-600 text-white py-3 sm:py-2 rounded-lg text-sm touch-target">
                    <i class="fas fa-check mr-2"></i>Complete
                </button>
                <button onclick="deleteTaskFromModal()" class="w-full sm:flex-1 bg-red-500 hover:bg-red-600 text-white py-3 sm:py-2 rounded-lg text-sm touch-target">
                    <i class="fas fa-trash mr-2"></i>Delete
                </button>
            </div>
        </div>
    </div>

    <script>
        // Store tasks in localStorage
        let tasks = JSON.parse(localStorage.getItem('smartCalendarTasks')) || [];
        let currentDate = new Date();
        let currentMonth = currentDate.getMonth();
        let currentYear = currentDate.getFullYear();
        let selectedTaskId = null;

        // Update date and time
        function updateDateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('currentDate').textContent = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        // Weather simulation
        const weatherConditions = ['☀️ 28°C', '⛅ 26°C', '🌧️ 24°C', '☁️ 25°C', '🌤️ 27°C'];
        const trafficConditions = ['Light 🚗', 'Moderate 🚕', 'Heavy 🚌', 'Clear 🚙', 'Busy 🚦'];
        
        setInterval(() => {
            document.getElementById('weatherInfo').innerHTML = weatherConditions[Math.floor(Math.random() * weatherConditions.length)];
            document.getElementById('trafficInfo').innerHTML = trafficConditions[Math.floor(Math.random() * trafficConditions.length)];
        }, 10000);

        // Set default date to today
        document.getElementById('taskDate').valueAsDate = new Date();

        // Add task - UPDATED with High/Medium/Low
        document.getElementById('taskForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const task = {
                id: Date.now(),
                title: document.getElementById('taskTitle').value,
                date: document.getElementById('taskDate').value,
                time: document.getElementById('taskTime').value,
                priority: document.getElementById('taskPriority').value, // 'high', 'medium', or 'low'
                description: document.getElementById('taskDesc').value || 'No description',
                completed: false,
                createdAt: new Date().toISOString()
            };
            
            tasks.push(task);
            localStorage.setItem('smartCalendarTasks', JSON.stringify(tasks));
            
            // Smart suggestion based on priority
            if (task.priority === 'high') {
                showNotification('🔴 High priority task added!', 'red');
            } else if (task.priority === 'medium') {
                showNotification('🟡 Medium priority task added', 'yellow');
            } else {
                showNotification('🟢 Low priority task added', 'green');
            }
            
            this.reset();
            document.getElementById('taskDate').valueAsDate = new Date();
            renderCalendar();
            updateStats();
            updateTodayTasks();
        });

        // Show notification
        function showNotification(message, color) {
            const notification = document.createElement('div');
            notification.className = `fixed top-4 right-4 bg-${color}-500 text-white px-3 py-2 rounded-lg shadow-lg z-50 text-sm animate-bounce`;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        // Render Calendar - UPDATED with High/Medium/Low classes
        function renderCalendar() {
            const firstDay = new Date(currentYear, currentMonth, 1);
            const lastDay = new Date(currentYear, currentMonth + 1, 0);
            const startingDay = firstDay.getDay();
            const monthLength = lastDay.getDate();
            
            document.getElementById('monthYearDisplay').textContent = 
                firstDay.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
            
            let calendarHTML = '';
            let dayCount = 1;
            
            for (let i = 0; i < 6; i++) {
                for (let j = 0; j < 7; j++) {
                    if (i === 0 && j < startingDay) {
                        calendarHTML += `<div class="calendar-day bg-gray-50 rounded p-1 min-h-[50px] sm:min-h-[80px] opacity-50"></div>`;
                    } else if (dayCount <= monthLength) {
                        const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(dayCount).padStart(2, '0')}`;
                        const dayTasks = tasks.filter(task => task.date === dateStr && !task.completed);
                        const isToday = isCurrentDate(dateStr);
                        
                        // Sort tasks by priority: high first, then medium, then low
                        const priorityOrder = { high: 1, medium: 2, low: 3 };
                        dayTasks.sort((a, b) => priorityOrder[a.priority] - priorityOrder[b.priority]);
                        
                        calendarHTML += `
                            <div class="calendar-day ${isToday ? 'current-day' : 'bg-white'} rounded p-1 border border-gray-200 hover:shadow-lg transition-all duration-200">
                                <div class="font-bold text-[10px] sm:text-sm mb-0 sm:mb-1 ${isToday ? 'text-blue-600' : 'text-gray-700'}">${dayCount}</div>
                                <div class="space-y-0 sm:space-y-1 max-h-[40px] sm:max-h-[60px] overflow-y-auto hide-scrollbar">
                                    ${dayTasks.slice(0, 2).map(task => `
                                        <div onclick="showTaskDetails(${task.id})" 
                                            class="task-item text-[8px] sm:text-xs p-0 sm:p-1 rounded priority-${task.priority} cursor-pointer hover:shadow-md task-badge">
                                            ${task.time.substring(0,5)} ${getPrioritySymbol(task.priority)} ${task.title.substring(0,3)}...
                                        </div>
                                    `).join('')}
                                    ${dayTasks.length > 2 ? `<div class="text-[6px] sm:text-xs text-gray-500">+${dayTasks.length-2}</div>` : ''}
                                </div>
                            </div>
                        `;
                        dayCount++;
                    } else {
                        calendarHTML += `<div class="calendar-day bg-gray-50 rounded p-1 min-h-[50px] sm:min-h-[80px] opacity-50"></div>`;
                    }
                }
            }
            
            document.getElementById('calendarGrid').innerHTML = calendarHTML;
            document.getElementById('totalTasks').textContent = `Tasks: ${tasks.filter(t => !t.completed).length}`;
        }

        // Helper function to get priority symbol
        function getPrioritySymbol(priority) {
            switch(priority) {
                case 'high': return '🔴';
                case 'medium': return '🟡';
                case 'low': return '🟢';
                default: return '';
            }
        }

        // Check if date is today
        function isCurrentDate(dateStr) {
            const today = new Date().toISOString().split('T')[0];
            return dateStr === today;
        }

        // Show task details - UPDATED with High/Medium/Low
        function showTaskDetails(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            
            selectedTaskId = taskId;
            
            let priorityColor = '';
            let priorityText = '';
            
            if (task.priority === 'high') {
                priorityColor = 'red';
                priorityText = 'HIGH';
            } else if (task.priority === 'medium') {
                priorityColor = 'yellow';
                priorityText = 'MEDIUM';
            } else {
                priorityColor = 'green';
                priorityText = 'LOW';
            }
            
            document.getElementById('modalTitle').textContent = task.title;
            document.getElementById('modalContent').innerHTML = `
                <p><span class="font-semibold">📅 Date:</span> ${new Date(task.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</p>
                <p><span class="font-semibold">⏰ Time:</span> ${task.time}</p>
                <p><span class="font-semibold">🎯 Priority:</span> <span class="px-2 py-1 rounded-full text-white bg-${priorityColor}-500 text-xs font-bold">${getPrioritySymbol(task.priority)} ${priorityText}</span></p>
                <p><span class="font-semibold">📝 Description:</span> ${task.description}</p>
                <p><span class="font-semibold">✅ Status:</span> ${task.completed ? 'Completed' : 'Pending'}</p>
            `;
            
            document.getElementById('taskModal').classList.remove('hidden');
            document.getElementById('taskModal').classList.add('flex');
        }

        // Close modal
        function closeModal() {
            document.getElementById('taskModal').classList.add('hidden');
            document.getElementById('taskModal').classList.remove('flex');
            selectedTaskId = null;
        }

        // Complete task from modal
        function completeTaskFromModal() {
            if (selectedTaskId) {
                tasks = tasks.map(task => 
                    task.id === selectedTaskId ? {...task, completed: true} : task
                );
                localStorage.setItem('smartCalendarTasks', JSON.stringify(tasks));
                renderCalendar();
                updateStats();
                updateTodayTasks();
                closeModal();
                showNotification('✅ Task completed!', 'green');
            }
        }

        // Delete task from modal
        function deleteTaskFromModal() {
            if (selectedTaskId) {
                tasks = tasks.filter(task => task.id !== selectedTaskId);
                localStorage.setItem('smartCalendarTasks', JSON.stringify(tasks));
                renderCalendar();
                updateStats();
                updateTodayTasks();
                closeModal();
                showNotification('🗑️ Task deleted', 'red');
            }
        }

        // Update statistics - UPDATED for High/Medium/Low
        function updateStats() {
            const highPriority = tasks.filter(t => t.priority === 'high' && !t.completed).length;
            const mediumPriority = tasks.filter(t => t.priority === 'medium' && !t.completed).length;
            const lowPriority = tasks.filter(t => t.priority === 'low' && !t.completed).length;
            
            document.getElementById('statHigh').textContent = highPriority;
            document.getElementById('statMedium').textContent = mediumPriority;
            document.getElementById('statLow').textContent = lowPriority;
        }

        // Update today's tasks - UPDATED for High/Medium/Low
        function updateTodayTasks() {
            const today = new Date().toISOString().split('T')[0];
            const todayTasks = tasks.filter(task => task.date === today && !task.completed);
            
            document.getElementById('todayTaskCount').textContent = `${todayTasks.length}`;
            
            if (todayTasks.length === 0) {
                document.getElementById('todayTasksList').innerHTML = `
                    <div class="bg-white bg-opacity-20 rounded-lg p-2 text-center text-xs sm:text-sm">
                        No tasks today! 🎉
                    </div>
                `;
            } else {
                // Sort by priority
                const priorityOrder = { high: 1, medium: 2, low: 3 };
                todayTasks.sort((a, b) => priorityOrder[a.priority] - priorityOrder[b.priority]);
                
                document.getElementById('todayTasksList').innerHTML = todayTasks.map(task => {
                    let priorityColor = task.priority === 'high' ? 'red' : (task.priority === 'medium' ? 'yellow' : 'green');
                    return `
                        <div onclick="showTaskDetails(${task.id})" 
                            class="bg-white bg-opacity-20 hover:bg-opacity-30 rounded-lg p-2 cursor-pointer priority-${task.priority}">
                            <div class="flex justify-between items-start">
                                <div class="text-xs sm:text-sm">
                                    <span class="font-bold">${task.time}</span>
                                    <span class="ml-2">${getPrioritySymbol(task.priority)} ${task.title}</span>
                                </div>
                                <span class="w-2 h-2 rounded-full bg-${priorityColor}-500"></span>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }

        // Change month
        function changeMonth(direction) {
            currentMonth += direction;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            } else if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderCalendar();
        }

        // Go to today
        function goToToday() {
            currentDate = new Date();
            currentMonth = currentDate.getMonth();
            currentYear = currentDate.getFullYear();
            renderCalendar();
        }

        // Reminders
        setInterval(() => {
            const now = new Date();
            tasks.forEach(task => {
                if (!task.completed) {
                    const taskDateTime = new Date(`${task.date}T${task.time}`);
                    const diffMins = Math.round((taskDateTime - now) / 60000);
                    
                    if (diffMins === 30) {
                        showNotification(`⏰ 30min: ${task.title}`, task.priority === 'high' ? 'red' : (task.priority === 'medium' ? 'yellow' : 'green'));
                    } else if (diffMins === 5) {
                        showNotification(`🔔 5min: ${task.title}`, 'red');
                    }
                }
            });
        }, 60000);

        // Health alerts
        setInterval(() => {
            const hour = new Date().getHours();
            if ([10,12,15,17].includes(hour)) {
                showNotification('💧 Time to drink water!', 'blue');
            }
        }, 3600000);

        // Initial render
        renderCalendar();
        updateStats();
        updateTodayTasks();
    </script>
</body>
</html>
